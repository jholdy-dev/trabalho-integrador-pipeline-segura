name: Pipeline Segura (Build → Scan → Sign → SBOM)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LOCAL_REF: pipeline-segura:ci

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-scan-sign:
    runs-on: ubuntu-latest
    steps:
      # ───────────────────────────── 0. Checkout + build ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem (carrega no daemon local p/ os scans)
        run: docker buildx build --load -t "$LOCAL_REF" .

      # ──────────────────── 1. CIS Docker Benchmark via DOCKLE (GATE) ────────────────────
      - name: "Gate 1 - Dockle (CIS Docker Benchmark)"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${GITHUB_WORKSPACE}/.dockleignore:/.dockleignore:ro" \
            goodwithtech/dockle:latest \
            --exit-code 1 \
            --exit-level fatal \
            --format list \
            "$LOCAL_REF"

      # ──────────────────── 2. Trivy - CVE + SECRETS (GATE) ────────────────────
      - name: "Gate 2 - Trivy (CVE CRITICAL + secrets)"
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.LOCAL_REF }}
          scan-type: image
          scanners: vuln,secret
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # ──────────────────── 3. SBOM CycloneDX (ARTEFATO DE AUDITORIA) ────────────────────
      - name: Gerar SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.LOCAL_REF }}
          scan-type: image
          format: cyclonedx
          output: sbom.cyclonedx.json

      - name: Publicar SBOM como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

      # ──────────────────── 4. Push + COSIGN KEYLESS (so apos os scans) ────────────────────
      - name: Normaliza nome da imagem (GHCR exige minusculo)
        if: github.event_name == 'push'
        run: echo "IMAGE=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Login no GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push da imagem e captura do DIGEST (sha256)
        if: github.event_name == 'push'
        id: push
        run: |
          docker tag "$LOCAL_REF" "$IMAGE:${GITHUB_SHA}"
          docker push "$IMAGE:${GITHUB_SHA}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE:${GITHUB_SHA}")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Imagem publicada por digest: $DIGEST"

      - name: Instalar Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: "Assinar imagem - Cosign KEYLESS (OIDC + Fulcio + Rekor)"
        if: github.event_name == 'push'
        run: cosign sign --yes "${{ steps.push.outputs.digest }}"

      # Bonus de auditoria: anexa o SBOM CycloneDX a imagem como attestation assinada.
      - name: "Attestation do SBOM (cosign attest, keyless)"
        if: github.event_name == 'push'
        run: |
          cosign attest --yes \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            "${{ steps.push.outputs.digest }}"

      - name: Resumo
        if: github.event_name == 'push'
        run: |
          echo "### Pipeline Segura concluida :lock:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Imagem assinada (keyless): \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verifique com: \`cosign verify $IMAGE@<digest> --certificate-identity-regexp '.*' --certificate-oidc-issuer https://token.actions.githubusercontent.com\`" >> "$GITHUB_STEP_SUMMARY"
